<script>
    // Init Stripe
    const stripe = Stripe('pk_live_51TDcSI0KrBqMi9flRG5XwMn2G8ENNGSavgBB11GlfWw9VMzGOkqc7eVHzjHBSAqDHmke7t40fhT3wHIhyKk0jfYj00yIzvhloh');
    const elements = stripe.elements();
    const cardElement = elements.create('card', {
        style: {
            base: {
                color: '#e5e7eb',
                fontFamily: 'DM Sans, sans-serif',
                fontSize: '14px',
                '::placeholder': { color: '#6b7280' }
            },
            invalid: { color: '#c0192c' }
        }
    });
    cardElement.mount('#stripe-card-element');

    let selectedPlan = null;
    let selectedPrice = null;
    let selectedName = null;

    // Check if plan was passed from main page
    const params = new URLSearchParams(window.location.search);
    const preselected = params.get('plan');
    if (preselected === 'senior') selectPlan('senior', '$25/mo', 'Senior / Assist Plan');
    if (preselected === 'residential') selectPlan('residential', '$35/mo', 'Residential Plan');
    if (preselected === 'str') selectPlan('str', '$55/mo', 'STR Logistics Plan');

    function selectPlan(plan, price, name) {
        selectedPlan = plan;
        selectedPrice = price;
        selectedName = name;

        document.querySelectorAll('.plan-card').forEach(c => {
            c.classList.remove('selected');
            const indicator = c.querySelector('.select-indicator');
            indicator.textContent = 'Click to Select';
            indicator.classList.remove('text-white', 'border-[#c0192c]');
            indicator.classList.add('text-gray-400');
        });

        const card = document.getElementById('card-' + plan);
        card.classList.add('selected');
        const indicator = card.querySelector('.select-indicator');
        indicator.textContent = '✓ Selected';
        indicator.classList.add('text-white', 'border-[#c0192c]');
        indicator.classList.remove('text-gray-400');

        document.getElementById('plan-error').classList.add('hidden');
    }

    function goToStep1() {
        document.getElementById('step-1').classList.add('active');
        document.getElementById('step-2').classList.remove('active');
    }

    function goToStep2() {
        if (!selectedPlan) {
            document.getElementById('plan-error').classList.remove('hidden');
            return;
        }
        document.getElementById('step-1').classList.remove('active');
        document.getElementById('step-2').classList.add('active');
        document.getElementById('summary-plan-name').textContent = selectedName;
        document.getElementById('summary-plan-price').textContent = selectedPrice;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function submitBooking() {
        const firstName = document.getElementById('first-name').value.trim();
        const lastName = document.getElementById('last-name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();

        if (!firstName || !lastName || !phone || !address) {
            alert('Please fill out all fields.');
            return;
        }

        document.getElementById('btn-text').textContent = 'Processing...';
        document.getElementById('btn-spinner').classList.remove('hidden');
        document.getElementById('submit-btn').disabled = true;

        try {
            // UPDATED PATH FOR CLOUDFLARE PAGES
            const res = await fetch('/functions/create-setup-intent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: firstName + ' ' + lastName,
                    phone,
                    address,
                    plan: selectedName
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error);

            const result = await stripe.confirmCardSetup(data.client_secret, {
                payment_method: {
                    card: cardElement,
                    billing_details: {
                        name: firstName + ' ' + lastName,
                        phone,
                        address: { line1: address }
                    }
                }
            });

            if (result.error) {
                document.getElementById('card-errors').textContent = result.error.message;
                document.getElementById('card-errors').classList.remove('hidden');
                throw new Error(result.error.message);
            }

            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-3').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (err) {
            console.error(err);
            document.getElementById('btn-text').textContent = 'Secure My Spot';
            document.getElementById('btn-spinner').classList.add('hidden');
            document.getElementById('submit-btn').disabled = false;
        }
    }
</script>
